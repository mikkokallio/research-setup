name: experiment

on:
  workflow_dispatch:
    inputs:
      model:
        description: Model identifier
        required: true
        default: gpt-5.3-codex
        type: choice
        options:
          - gpt-5.3-codex
      condition:
        description: Execution condition
        required: true
        default: k3
        type: choice
        options:
          - single
          - single_plan
          - k3
      tier:
        description: Tier label
        required: true
        default: tier0
        type: choice
        options:
          - tier0
      tier_spec_file:
        description: Path to tier spec file
        required: true
        default: specs/tiers/tier0_proposed.md
        type: string
      deploy:
        description: Deploy to Azure Container Apps
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write
  models: read

env:
  EXP_PREFIX: ${{ vars.EXP_PREFIX || 'exp' }}
  GH_ORG_OR_USER: ${{ vars.GH_ORG_OR_USER || 'mikkokallio' }}
  REPO_NAME: ${{ vars.REPO_NAME || 'research-setup' }}
  AZ_SUBSCRIPTION_ID: ${{ vars.AZ_SUBSCRIPTION_ID }}
  AZ_LOCATION: swedencentral
  AZ_RG: ${{ vars.AZ_RG }}
  AZ_ACR: ${{ vars.AZ_ACR }}
  AZ_ACA_ENV: ${{ vars.AZ_ACA_ENV }}
  AZ_WEB_APP: ${{ vars.AZ_WEB_APP }}
  AZ_API_APP: ${{ vars.AZ_API_APP }}
  RUN_SCOPE: ${{ vars.RUN_SCOPE || 'shared' }}
  RETENTION_DAYS: ${{ vars.RETENTION_DAYS || '30' }}
  MODEL: ${{ inputs.model || 'gpt-5.3-codex' }}
  CONDITION: ${{ inputs.condition || 'k3' }}
  TIER: ${{ inputs.tier || 'tier0' }}
  TIER_SPEC_FILE: ${{ inputs.tier_spec_file || 'specs/tiers/tier0_proposed.md' }}

jobs:
  split:
    runs-on: ubuntu-latest
    outputs:
      run_key: ${{ steps.meta.outputs.run_key }}
      k: ${{ steps.k.outputs.k }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Check Copilot auth token
        run: |
          if [ -z "$COPILOT_GITHUB_TOKEN" ]; then
            echo "::error::Missing required secret COPILOT_GITHUB_TOKEN."
            exit 1
          fi
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Log Copilot token account
        run: |
          LOGIN=$(curl -sS \
            -H "Authorization: Bearer $COPILOT_GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user | python -c "import json,sys; print(json.load(sys.stdin).get('login','unknown'))")
          echo "COPILOT_TOKEN_LOGIN=$LOGIN"
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Validate Copilot request permission
        run: |
          mkdir -p work
          set +e
          copilot --model "$MODEL" -p "Reply with OK only." > work/copilot_auth_check.txt 2>&1
          CODE=$?
          if [ $CODE -ne 0 ] && grep -qi "interactive mode to enable this model" work/copilot_auth_check.txt; then
            copilot --model "gpt-4.1" -p "Reply with OK only." > work/copilot_auth_check_gpt41.txt 2>&1
            CODE=$?
            if [ $CODE -eq 0 ]; then
              echo "Model '$MODEL' is gated for this token in non-interactive mode; continuing with gpt-4.1 fallback availability."
            else
              copilot -p "Reply with OK only." > work/copilot_auth_check_default_model.txt 2>&1
              CODE=$?
              if [ $CODE -eq 0 ]; then
                echo "Model '$MODEL' is gated; continuing with default model selection."
              fi
            fi
          fi
          set -e
          if [ $CODE -ne 0 ]; then
            echo "::error::Copilot CLI request failed. Ensure COPILOT_GITHUB_TOKEN is from an account with Copilot access and has Copilot Requests permission."
            cat work/copilot_auth_check.txt
            if [ -f work/copilot_auth_check_gpt41.txt ]; then
              cat work/copilot_auth_check_gpt41.txt
            fi
            if [ -f work/copilot_auth_check_default_model.txt ]; then
              cat work/copilot_auth_check_default_model.txt
            fi
            exit 1
          fi
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          MODEL: ${{ env.MODEL }}

      - name: Stage start
        id: stage_start
        run: |
          echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"
          echo "iso=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build spec
        run: |
          mkdir -p work/slices
          cat specs/base_prd.md "$TIER_SPEC_FILE" > work/spec.md

      - name: Resolve run metadata
        id: meta
        run: |
          RUN_KEY="${MODEL}-${CONDITION}-${TIER}"
          echo "run_key=$RUN_KEY" >> "$GITHUB_OUTPUT"

      - name: Resolve K
        id: k
        run: |
          case "$CONDITION" in
            k3) K=3 ;;
            *) K=1 ;;
          esac
          echo "k=$K" >> "$GITHUB_OUTPUT"

      - name: Split with coding agent
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          k = int(os.environ["K"])
          condition = os.environ["CONDITION"]
          spec = Path("work/spec.md").read_text(encoding="utf-8")
          out_dir = Path("work/slices")
          out_dir.mkdir(parents=True, exist_ok=True)

          if condition != "k3":
              Path("work/splitter_raw.txt").write_text("Splitter skipped for non-k3 condition", encoding="utf-8")
              (out_dir / "slice_1.md").write_text(spec, encoding="utf-8")
              plan = {
                  "mode": condition,
                  "slices": [
                      {
                          "id": "slice_1",
                          "title": "single_work_item",
                          "content": spec,
                      }
                  ],
              }
              Path("work/split_plan.json").write_text(json.dumps(plan, indent=2), encoding="utf-8")
              Path("work/slices/slices.txt").write_text("slice_1.md\n", encoding="utf-8")
              raise SystemExit(0)

          prompt = f"""
          You are the Splitter agent for a coding experiment.
          Read the full specification below and split it into exactly {k} implementation slices that can be coded independently and then integrated.

          Rules:
          - Return ONLY valid JSON.
          - JSON schema:
            {{
              "shared_context": {{
                "critical_contracts": ["..."],
                "cross_slice_assumptions": ["..."]
              }},
              \"slices\": [
                {{
                  \"id\": \"slice_1\",
                  \"title\": \"...\",
                  \"goal\": \"...\",
                  \"instructions\": \"...\",
                  \"dependencies\": [\"slice_2\"],
                  \"implementation_dependencies\": [\"slice_2\"],
                  \"validation_dependencies\": [\"slice_2\"],
                  \"source_requirements\": [\"verbatim requirement text from spec\"],
                  \"critical_contracts_needed\": [\"only contracts needed by this slice\"],
                  \"tests_to_author_now\": [\"...\"],
                  \"tests_to_run_now\": [\"...\"],
                  \"tests_deferred_until_dependencies\": [\"...\"],
                  \"effort_points\": 3
                }},
                ...
              ],
              \"integration_notes\": \"...\"
            }}
          - Provide exactly {k} slices with ids slice_1..slice_{k}.
          - Keep each slice concrete, implementation oriented, and testable.
          - Optimize for concurrency: minimize hard implementation dependencies.
          - Use `dependencies` and `implementation_dependencies` only for hard blockers that prevent coding work.
          - Use `validation_dependencies` for checks that can be authored now but executed later.
          - If API contract/interface is known, frontend coding should not depend on backend implementation.
          - Prevent information loss: every important requirement from the spec must appear in at least one slice `source_requirements`.
          - Prevent bloat: duplicate only contracts/assumptions that are required by more than one slice.
          - `shared_context` must contain ONLY critical contracts and cross-slice assumptions, not the full spec.
          - Every slice must include tests that can be authored immediately (`tests_to_author_now`).
          - Prefer writing tests early, and defer only execution when blocked.
          - Balance work across slices with roughly similar effort_points.
          - Avoid a final integration-only mega-slice; distribute test authoring earlier and keep final integration thin.
          - Do not include markdown fences.

          SPEC:
          {spec}
          """.strip()

          cmd = [
              "copilot",
              "--allow-all",
              "--no-ask-user",
              "--model",
              os.environ["MODEL"],
              "-p",
              prompt,
          ]
          result = subprocess.run(cmd, capture_output=True, text=True, check=False)
          if result.returncode != 0:
              stderr_blob = ((result.stdout or "") + "\n" + (result.stderr or "")).lower()
              if "interactive mode to enable this model" in stderr_blob:
                  fallback_cmd = [
                      "copilot",
                      "--allow-all",
                      "--no-ask-user",
                      "--model",
                      "gpt-4.1",
                      "-p",
                      prompt,
                  ]
                  fallback_result = subprocess.run(fallback_cmd, capture_output=True, text=True, check=False)
                  if fallback_result.returncode != 0:
                      fallback_cmd = [
                          "copilot",
                          "--allow-all",
                          "--no-ask-user",
                          "-p",
                          prompt,
                      ]
                      fallback_result = subprocess.run(fallback_cmd, capture_output=True, text=True, check=False)
              else:
                  fallback_cmd = [
                      "copilot",
                      "--allow-all",
                      "--no-ask-user",
                      "--model",
                      "gpt-4.1",
                      "-p",
                      prompt,
                  ]
                  fallback_result = subprocess.run(fallback_cmd, capture_output=True, text=True, check=False)
              combined = (
                  "PRIMARY_CMD_STDOUT:\n"
                  + (result.stdout or "")
                  + "\nPRIMARY_CMD_STDERR:\n"
                  + (result.stderr or "")
                  + "\nFALLBACK_CMD_STDOUT:\n"
                  + (fallback_result.stdout or "")
                  + "\nFALLBACK_CMD_STDERR:\n"
                  + (fallback_result.stderr or "")
              )
              Path("work/splitter_raw.txt").write_text(combined, encoding="utf-8")
              if fallback_result.returncode != 0:
                  raise RuntimeError("Copilot splitter call failed for both requested model and fallback model")
              result = fallback_result
          raw = (result.stdout or "") + "\n" + (result.stderr or "")
          Path("work/splitter_raw.txt").write_text(raw, encoding="utf-8")

          start = raw.find("{")
          end = raw.rfind("}")
          if start == -1 or end == -1 or end <= start:
              raise RuntimeError("Could not locate JSON object in splitter output")

          data = json.loads(raw[start : end + 1])
          shared_context = data.get("shared_context")
          if not isinstance(shared_context, dict):
              shared_context = {}
          shared_context.setdefault("critical_contracts", [])
          shared_context.setdefault("cross_slice_assumptions", [])
          data["shared_context"] = shared_context

          slices = data.get("slices", [])
          if len(slices) != k:
              raise RuntimeError(f"Splitter returned {len(slices)} slices, expected {k}")

          listed = []
          for index in range(1, k + 1):
              expected_id = f"slice_{index}"
              item = next((s for s in slices if s.get("id") == expected_id), None)
              if item is None:
                  raise RuntimeError(f"Missing {expected_id} in splitter output")

              deps = item.get("dependencies", []) or []
              impl_deps = item.get("implementation_dependencies", deps) or []
              val_deps = item.get("validation_dependencies", []) or []
              tests_author_now = item.get("tests_to_author_now", []) or []
              tests_run_now = item.get("tests_to_run_now", []) or []
              tests_deferred = item.get("tests_deferred_until_dependencies", []) or []
              source_requirements = item.get("source_requirements", []) or []
              contracts_needed = item.get("critical_contracts_needed", []) or []

              text = "\n\n".join(
                  [
                      f"# {item.get('title','').strip()}",
                      f"\nGoal:\n{item.get('goal','').strip()}",
                      f"\nInstructions:\n{item.get('instructions','').strip()}",
                      f"\nSource Requirements (owned by this slice):\n{json.dumps(source_requirements, indent=2)}",
                      f"\nCritical Contracts Needed:\n{json.dumps(contracts_needed, indent=2)}",
                      f"\nDependencies:\n{', '.join(deps) or 'none'}",
                      f"\nImplementation Dependencies (hard blockers):\n{', '.join(impl_deps) or 'none'}",
                      f"\nValidation Dependencies (can author now, run later):\n{', '.join(val_deps) or 'none'}",
                      f"\nTests To Author Now:\n{json.dumps(tests_author_now, indent=2)}",
                      f"\nTests To Run Now:\n{json.dumps(tests_run_now, indent=2)}",
                      f"\nTests Deferred Until Dependencies:\n{json.dumps(tests_deferred, indent=2)}",
                      f"\nEffort Points:\n{item.get('effort_points', 'n/a')}",
                      f"\nGlobal Critical Contracts (shared):\n{json.dumps(shared_context.get('critical_contracts', []), indent=2)}",
                      f"\nCross-Slice Assumptions (shared):\n{json.dumps(shared_context.get('cross_slice_assumptions', []), indent=2)}",
                      f"\nSpec Reference:\nwork/spec.md",
                  ]
              ).strip() + "\n"
              path = out_dir / f"slice_{index}.md"
              path.write_text(text, encoding="utf-8")
              listed.append(path.name)

          Path("work/split_plan.json").write_text(json.dumps(data, indent=2), encoding="utf-8")
          Path("work/slices/slices.txt").write_text("\n".join(listed) + "\n", encoding="utf-8")
          PY
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          MODEL: ${{ env.MODEL }}
          CONDITION: ${{ env.CONDITION }}
          K: ${{ steps.k.outputs.k }}

      - name: Run manifest
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          run_key = os.environ["RUN_KEY"]
          payload = {
              "run_key": run_key,
              "model": os.environ["MODEL"],
              "condition": os.environ["CONDITION"],
              "tier": os.environ["TIER"],
              "timestamp": datetime.now(timezone.utc).isoformat(),
              "run_scope": os.environ["RUN_SCOPE"],
              "apps": {
                  "web": os.environ["AZ_WEB_APP"],
                  "api": os.environ["AZ_API_APP"],
              },
          }
          with open("work/run_manifest.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2)
          PY
        env:
          RUN_KEY: ${{ steps.meta.outputs.run_key }}

      - name: Stage telemetry
        run: |
          python - <<'PY'
          import json
          import os
          import time
          from datetime import datetime, timezone

          start_epoch = int(os.environ["START_EPOCH"])
          end_epoch = int(time.time())
          start_iso = os.environ["START_ISO"]
          end_iso = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          timing = {
              "stage": "split",
              "start_epoch": start_epoch,
              "end_epoch": end_epoch,
              "start_iso": start_iso,
              "end_iso": end_iso,
              "duration_seconds": end_epoch - start_epoch,
              "run_key": os.environ["RUN_KEY"],
          }
          usage = {
              "stage": "split",
              "run_key": os.environ["RUN_KEY"],
              "model": os.environ["MODEL"],
              "condition": os.environ["CONDITION"],
              "tier": os.environ["TIER"],
              "token_usage": {
                  "prompt_tokens": None,
                  "completion_tokens": None,
                  "total_tokens": None,
              },
              "cost": {
                  "currency": "USD",
                  "amount": None,
              },
              "notes": "Best-effort telemetry. Raw Copilot output is saved for parsing.",
          }

          with open("work/stage_timing_split.json", "w", encoding="utf-8") as f:
              json.dump(timing, f, indent=2)
          with open("work/usage_split.json", "w", encoding="utf-8") as f:
              json.dump(usage, f, indent=2)
          PY
        env:
          START_EPOCH: ${{ steps.stage_start.outputs.epoch }}
          START_ISO: ${{ steps.stage_start.outputs.iso }}
          RUN_KEY: ${{ steps.meta.outputs.run_key }}

      - name: Upload split artifacts
        uses: actions/upload-artifact@v4
        with:
          name: split-${{ steps.meta.outputs.run_key }}
          path: |
            work/slices
            work/spec.md
            work/split_plan.json
            work/splitter_raw.txt
            work/run_manifest.json
            work/stage_timing_split.json
            work/usage_split.json

  implement_and_test:
    runs-on: ubuntu-latest
    needs: split
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Check Copilot auth token
        run: |
          if [ -z "$COPILOT_GITHUB_TOKEN" ]; then
            echo "::error::Missing required secret COPILOT_GITHUB_TOKEN."
            exit 1
          fi
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Download split artifact
        uses: actions/download-artifact@v4
        with:
          name: split-${{ needs.split.outputs.run_key }}
          path: work

      - name: Configure git identity for local commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Reset app source directories (clean-room)
        run: |
          rm -rf apps/web apps/api
          mkdir -p apps/web apps/api

      - name: Agentic coding loop
        run: |
          python scripts/run_agentic_implement.py \
            --model "$MODEL" \
            --condition "$CONDITION" \
            --run-key "${{ needs.split.outputs.run_key }}" \
            --k "${{ needs.split.outputs.k }}" \
            --spec "work/spec.md" \
            --slices-dir "work/slices" \
            --split-plan "work/split_plan.json" \
            --out-dir "work/agentic"
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          MODEL: ${{ env.MODEL }}
          CONDITION: ${{ env.CONDITION }}

      - name: Build web (best effort)
        run: |
          mkdir -p work/agentic
          set +e
          cd apps/web
          npm install
          npm run build 2>&1 | tee ../../work/agentic/web_build_attempt1.log
          set -e
          exit 0

      - name: Build api (best effort)
        run: |
          mkdir -p work/agentic
          set +e
          cd apps/api
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m compileall . 2>&1 | tee ../../work/agentic/api_build_attempt1.log
          set -e
          exit 0

      - name: Stage telemetry
        run: |
          python - <<'PY'
          import json
          import os
          import time
          from datetime import datetime, timezone

          timings = []
          for path in sorted(os.listdir("work/agentic/timings")):
              if path.endswith(".json"):
                  with open(f"work/agentic/timings/{path}", "r", encoding="utf-8") as f:
                      timings.append(json.load(f))

          start_values = [x["start_epoch"] for x in timings if "start_epoch" in x]
          end_values = [x["end_epoch"] for x in timings if "end_epoch" in x]

          start_epoch = min(start_values) if start_values else int(time.time())
          end_epoch = max(end_values) if end_values else int(time.time())

          timing = {
              "stage": "implement_and_test",
              "start_epoch": start_epoch,
              "end_epoch": end_epoch,
              "start_iso": datetime.fromtimestamp(start_epoch, timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "end_iso": datetime.fromtimestamp(end_epoch, timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "duration_seconds": end_epoch - start_epoch,
              "run_key": os.environ["RUN_KEY"],
          }
          with open("work/stage_timing_implement_and_test.json", "w", encoding="utf-8") as f:
              json.dump(timing, f, indent=2)
          PY
        env:
          RUN_KEY: ${{ needs.split.outputs.run_key }}

      - name: Upload implement/test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: implement-${{ needs.split.outputs.run_key }}
          path: |
            apps/web
            apps/api
            work/agentic
            work/stage_timing_implement_and_test.json

  deploy:
    if: ${{ inputs.deploy != false }}
    runs-on: ubuntu-latest
    needs:
      - split
      - implement_and_test
    steps:
      - uses: actions/checkout@v4

      - name: Download implement artifact
        uses: actions/download-artifact@v4
        with:
          name: implement-${{ needs.split.outputs.run_key }}
          path: .

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve run metadata
        id: run
        run: |
          RUN_KEY="${MODEL}-${CONDITION}-${TIER}"
          REV_SUFFIX=$(echo -n "${RUN_KEY}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" | sha256sum | cut -c1-8)
          echo "run_key=$RUN_KEY" >> "$GITHUB_OUTPUT"
          echo "rev_suffix=$REV_SUFFIX" >> "$GITHUB_OUTPUT"

      - name: ACR login
        run: |
          az acr login --name $AZ_ACR

      - name: Ensure ACA registry pull access
        run: |
          retry_aca() {
            local cmd="$1"
            local attempts=10
            local delay=20
            local n=1
            while [ $n -le $attempts ]; do
              set +e
              out=$(eval "$cmd" 2>&1)
              code=$?
              set -e
              if [ $code -eq 0 ]; then
                return 0
              fi
              if echo "$out" | grep -q "ContainerAppOperationInProgress"; then
                echo "Container app operation in progress, retry $n/$attempts after ${delay}s..."
                sleep $delay
                n=$((n+1))
                continue
              fi
              echo "$out"
              return $code
            done
            echo "$out"
            return 1
          }

          ACR_ID=$(az acr show --name $AZ_ACR --resource-group $AZ_RG --query id -o tsv)
          ACR_LOGIN=$(az acr show --name $AZ_ACR --resource-group $AZ_RG --query loginServer -o tsv)

          retry_aca "az containerapp identity assign --name $AZ_API_APP --resource-group $AZ_RG >/dev/null"
          retry_aca "az containerapp identity assign --name $AZ_WEB_APP --resource-group $AZ_RG >/dev/null"

          API_PRINCIPAL=$(az containerapp identity show --name $AZ_API_APP --resource-group $AZ_RG --query principalId -o tsv)
          WEB_PRINCIPAL=$(az containerapp identity show --name $AZ_WEB_APP --resource-group $AZ_RG --query principalId -o tsv)

          az role assignment create --assignee-object-id "$API_PRINCIPAL" --assignee-principal-type ServicePrincipal --role AcrPull --scope "$ACR_ID" >/dev/null || true
          az role assignment create --assignee-object-id "$WEB_PRINCIPAL" --assignee-principal-type ServicePrincipal --role AcrPull --scope "$ACR_ID" >/dev/null || true

          retry_aca "az containerapp registry set --name $AZ_API_APP --resource-group $AZ_RG --server '$ACR_LOGIN' --identity system >/dev/null"
          retry_aca "az containerapp registry set --name $AZ_WEB_APP --resource-group $AZ_RG --server '$ACR_LOGIN' --identity system >/dev/null"

      - name: Build and push API
        run: |
          API_IMAGE="$AZ_ACR.azurecr.io/${{ env.REPO_NAME }}-api:${{ steps.run.outputs.run_key }}"
          docker build -t "$API_IMAGE" apps/api
          docker push "$API_IMAGE"
          echo "API_IMAGE=$API_IMAGE" >> "$GITHUB_ENV"

      - name: Deploy API revision
        run: |
          az containerapp update \
            --name $AZ_API_APP \
            --resource-group $AZ_RG \
            --image "$API_IMAGE" \
            --revision-suffix ${{ steps.run.outputs.rev_suffix }} \
            --set-env-vars RUN_KEY=${{ steps.run.outputs.run_key }} RUN_MODEL=${MODEL} RUN_CONDITION=${CONDITION}

      - name: Resolve API revision URL
        id: api
        run: |
          API_FQDN=$(az containerapp revision list \
            --name $AZ_API_APP \
            --resource-group $AZ_RG \
            --query "[?properties.template.revisionSuffix=='${{ steps.run.outputs.rev_suffix }}'].properties.fqdn" \
            -o tsv)
          echo "api_fqdn=$API_FQDN" >> "$GITHUB_OUTPUT"

      - name: Build and push web
        run: |
          WEB_IMAGE="$AZ_ACR.azurecr.io/${{ env.REPO_NAME }}-web:${{ steps.run.outputs.run_key }}"
          docker build \
            --build-arg VITE_RUN_KEY=${{ steps.run.outputs.run_key }} \
            --build-arg VITE_MODEL=${MODEL} \
            --build-arg VITE_CONDITION=${CONDITION} \
            --build-arg VITE_TIER=${TIER} \
            --build-arg VITE_API_URL=https://${{ steps.api.outputs.api_fqdn }} \
            -t "$WEB_IMAGE" apps/web
          docker push "$WEB_IMAGE"
          echo "WEB_IMAGE=$WEB_IMAGE" >> "$GITHUB_ENV"

      - name: Deploy web revision
        run: |
          az containerapp update \
            --name $AZ_WEB_APP \
            --resource-group $AZ_RG \
            --image "$WEB_IMAGE" \
            --revision-suffix ${{ steps.run.outputs.rev_suffix }}

      - name: Resolve web revision URL
        id: web
        run: |
          WEB_FQDN=$(az containerapp revision list \
            --name $AZ_WEB_APP \
            --resource-group $AZ_RG \
            --query "[?properties.template.revisionSuffix=='${{ steps.run.outputs.rev_suffix }}'].properties.fqdn" \
            -o tsv)
          echo "web_fqdn=$WEB_FQDN" >> "$GITHUB_OUTPUT"

      - name: Deployment manifest
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          payload = {
              "run_key": os.environ["RUN_KEY"],
              "timestamp": datetime.now(timezone.utc).isoformat(),
              "web_url": f"https://{os.environ['WEB_FQDN']}",
              "api_url": f"https://{os.environ['API_FQDN']}",
          }
          with open("deploy_info.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2)
          PY
        env:
          RUN_KEY: ${{ steps.run.outputs.run_key }}
          WEB_FQDN: ${{ steps.web.outputs.web_fqdn }}
          API_FQDN: ${{ steps.api.outputs.api_fqdn }}

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-${{ steps.run.outputs.run_key }}
          path: deploy_info.json

  summarize_run:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - split
      - implement_and_test
      - deploy
    steps:
      - name: Download split artifact
        if: ${{ needs.split.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: split-${{ needs.split.outputs.run_key }}
          path: aggregate/split

      - name: Download implement artifact
        if: ${{ needs.implement_and_test.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: implement-${{ needs.split.outputs.run_key }}
          path: aggregate/implement

      - name: Download deploy artifact
        if: ${{ inputs.deploy != false && needs.deploy.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: deploy-${{ needs.split.outputs.run_key }}
          path: aggregate/deploy

      - name: Build run summary
        run: |
          python - <<'PY'
          import glob
          import json
          import os
          from pathlib import Path

          root = Path("aggregate")

          def read_json_files(pattern):
              out = []
              for file_path in glob.glob(str(root / pattern), recursive=True):
                  with open(file_path, "r", encoding="utf-8") as f:
                      out.append(json.load(f))
              return out

          split_timing = read_json_files("split/stage_timing_split.json")
          impl_timings = read_json_files("implement/agentic/timings/*.json")
          impl_stage = read_json_files("implement/stage_timing_implement_and_test.json")
          usage = read_json_files("split/usage_split.json") + read_json_files("implement/agentic/usage/*.json")

          all_timings = split_timing + impl_timings + impl_stage
          start_values = [x["start_epoch"] for x in all_timings if isinstance(x, dict) and "start_epoch" in x]
          end_values = [x["end_epoch"] for x in all_timings if isinstance(x, dict) and "end_epoch" in x]
          wall_clock = max(end_values) - min(start_values) if start_values and end_values else None

          deploy_info = None
          deploy_info_path = root / "deploy" / "deploy_info.json"
          if deploy_info_path.exists():
              with open(deploy_info_path, "r", encoding="utf-8") as f:
                  deploy_info = json.load(f)

          summary = {
              "run_key": os.environ["RUN_KEY"],
              "model": os.environ["MODEL"],
              "condition": os.environ["CONDITION"],
              "tier": os.environ["TIER"],
              "timings": all_timings,
              "total_wall_clock_seconds": wall_clock,
              "usage": usage,
              "deploy": deploy_info,
          }

          out_path = root / "run_summary.json"
          out_path.parent.mkdir(parents=True, exist_ok=True)
          with open(out_path, "w", encoding="utf-8") as f:
              json.dump(summary, f, indent=2)
          PY
        env:
          RUN_KEY: ${{ needs.split.outputs.run_key }}

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ needs.split.outputs.run_key }}
          path: aggregate/run_summary.json
